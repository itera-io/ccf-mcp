# GitHub Actions workflow for the rolling latest release

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: latest-release
  cancel-in-progress: true

jobs:
  publish-latest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Verify dependencies
        run: |
          go mod verify
          go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build release archives
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove previous rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --cleanup-tag -y || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/latest" || true

      - name: Publish rolling latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-notes.md <<'EOF'
          Automated rolling release from the latest `main` commit.

          This release is recreated on each push to `main`, and older packaged releases are removed so only the latest build is kept.
          EOF

          gh release create latest \
            dist/*.tar.gz \
            dist/*.zip \
            dist/checksums.txt \
            --target "${GITHUB_SHA}" \
            --title "Latest build" \
            --notes-file release-notes.md